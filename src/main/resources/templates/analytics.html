<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Zoho SETU | My Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .fade-in { animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .stat-card { border-radius: 20px; border: none; box-shadow: 0 8px 30px rgba(0,0,0,0.04); transition: all 0.3s ease; overflow: hidden; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
        .gradient-primary { background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); color: white; }
        .gradient-success { background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%); color: white; }
        .gradient-warning { background: linear-gradient(135deg, #ffc107 0%, #e0a800 100%); color: white; }
        .icon-bg { position: absolute; right: -20px; bottom: -20px; font-size: 100px; opacity: 0.15; transform: rotate(-15deg); }
        .glass-nav { background: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="fade-in">

<nav class="navbar navbar-expand-lg navbar-light glass-nav sticky-top py-3 mb-4">
    <div class="container border-start border-4 border-info ps-3">
        <a class="navbar-brand fw-bolder fs-4 text-dark" href="#">
            <i class="bi bi-bar-chart-line-fill text-info"></i> My Cloud <span class="text-info">Analytics</span>
        </a>
        <div class="ms-auto d-flex gap-2">
            <a href="/dashboard" class="btn btn-dark btn-sm fw-bold"><i class="bi bi-arrow-left"></i> Back to Drive</a>
        </div>
    </div>
</nav>

<div class="container">
    
    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="card stat-card gradient-success p-4 position-relative h-100">
                <i class="bi bi-files icon-bg"></i>
                <h6 class="text-white-50 fw-bold text-uppercase tracking-wide">My Uploaded Files</h6>
                <h1 class="display-4 fw-bold mb-0" th:text="${totalFiles}">0</h1>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card gradient-warning p-4 position-relative h-100">
                <i class="bi bi-hdd-network-fill icon-bg"></i>
                <h6 class="text-white-50 fw-bold text-uppercase tracking-wide">My Storage Used</h6>
                <h1 class="display-4 fw-bold mb-0 text-white"><span th:text="${totalStorage}">0</span> <span class="fs-4">MB</span></h1>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card stat-card gradient-primary p-4 position-relative h-100">
                <i class="bi bi-rocket-takeoff-fill icon-bg"></i>
                <h6 class="text-white-50 fw-bold text-uppercase tracking-wide">My Active Plan</h6>
                <h2 class="fw-bold mb-0 text-white mt-3" th:text="${myPlan}">Free Tier</h2>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card stat-card p-4 h-100 border-0 bg-white">
                <h5 class="fw-bold text-dark mb-4 text-center"><i class="bi bi-robot text-primary me-2"></i> File Count by Category</h5>
                <div class="chart-container" style="position: relative; height:300px; width:100%">
                    <canvas id="tagChart"></canvas> 
                </div>
            </div>
        </div>
        
        <div class="col-md-6 mb-4">
            <div class="card stat-card p-4 h-100 border-0 bg-white">
                <h5 class="fw-bold text-dark mb-4 text-center"><i class="bi bi-sd-card-fill text-danger me-2"></i> Storage Space Consumed (MB)</h5>
                <div class="chart-container" style="position: relative; height:300px; width:100%">
                    <canvas id="storageChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const tagLabels = /*[[${tagLabels}]]*/ [];
    const tagData = /*[[${tagData}]]*/ [];
    const storageLabels = /*[[${storageLabels}]]*/ [];
    const storageData = /*[[${storageData}]]*/ [];

    Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
    Chart.defaults.color = '#6c757d';

    // 1. Doughnut Chart (File Count)
    new Chart(document.getElementById('tagChart').getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: tagLabels,
            datasets: [{
                data: tagData,
                backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796'],
                borderWidth: 0, hoverOffset: 10
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
    });

    // 2. Bar Chart (Storage by Tag in MB)
    const ctxBar = document.getElementById('storageChart').getContext('2d');
    const gradientBar = ctxBar.createLinearGradient(0, 0, 0, 400);
    gradientBar.addColorStop(0, 'rgba(231, 74, 59, 1)');   // Red
    gradientBar.addColorStop(1, 'rgba(231, 74, 59, 0.2)');

    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: storageLabels,
            datasets: [{
                label: ' Megabytes (MB)',
                data: storageData,
                backgroundColor: gradientBar,
                borderColor: '#e74a3b', borderWidth: 1, borderRadius: 6, barThickness: 40
            }]
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            scales: { y: { beginAtZero: true }, x: { grid: { display: false } } },
            plugins: { legend: { display: false } }
        }
    });
</script>

</body>
</html>
