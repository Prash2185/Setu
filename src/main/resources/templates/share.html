<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Share | Setu Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a; /* Dark sleek background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f8fafc;
        }
        .share-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            margin: auto;
        }
        .file-icon {
            font-size: 80px;
            color: #3b82f6; /* Corporate Blue */
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        .btn-download {
            background-color: #deff9a; /* Neon Green from your slides */
            color: #0f172a;
            font-weight: bold;
            border-radius: 50px;
            padding: 12px 24px;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-download:hover {
            background-color: #c4eb71;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(222, 255, 154, 0.4);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container text-center">
        <div class="share-card p-5">
            <div class="mb-4">
                <i class="fa-solid fa-file-shield file-icon"></i>
            </div>
            
            <h3 class="mb-2" th:text="${file.fileName}">Q4_Financial_Report.pdf</h3>
            <p class="text-muted mb-4">
                <i class="fa-solid fa-hdd me-1"></i> <span th:text="${file.size}">2.4 MB</span> • 
                <i class="fa-solid fa-lock me-1 ms-2"></i> Secure Transfer
            </p>

            <a th:href="@{/download/{id}(id=${file.id})}" class="btn btn-download w-100 fs-5">
                <i class="fa-solid fa-cloud-arrow-down me-2"></i> Download File
            </a>
            
            <div class="mt-4">
                <small class="text-secondary"><i class="fa-solid fa-shield-halved"></i> Powered by Setu IAM Security</small>
            </div>
        </div>
    </div>

</body>
</html>
