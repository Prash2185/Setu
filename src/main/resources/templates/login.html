<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Zoho SETU | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 30px; background: white; }
        .google-btn { background-color: #ffffff; color: #757575; border: 1px solid #ddd; font-weight: bold; }
        .google-btn:hover { background-color: #f1f1f1; }
        .zoho-btn { background-color: #1a62ff; color: white; font-weight: bold; }
        .zoho-btn:hover { background-color: #0d4ecc; color: white; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #888; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #ddd; }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <h3 class="fw-bold mb-1"><i class="bi bi-cloud-arrow-up-fill text-primary"></i> ZOHO SETU</h3>
        <p class="text-muted mb-4">Welcome back! Please login to your cloud.</p>

        <div th:if="${param.error}" class="alert alert-danger shadow-sm border-0 mb-3" role="alert">
            <strong><i class="fas fa-exclamation-triangle"></i> API Scope Restriction:</strong> 
            OAuth2 token exchange with Zoho failed due to test-environment limits. Please use Google SSO for immediate login access.
        </div>

        <div th:if="${param.error}" class="alert alert-danger p-2" role="alert">
            Invalid username or password.
        </div>

        <a href="/oauth2/authorization/google" class="btn google-btn w-100 mb-3 py-2">
            <i class="bi bi-google text-danger me-2"></i> Continue with Google
        </a>
        
        <a href="/oauth2/authorization/zoho" class="btn zoho-btn w-100 mb-3 py-2">
            <i class="bi bi-building me-2"></i> Sign in with Zoho
        </a>

        <div class="divider">OR</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3 text-start">
                <input type="text" name="username" class="form-control py-2" placeholder="Username" required>
            </div>
            <div class="mb-4 text-start">
                <input type="password" name="password" class="form-control py-2" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">Login</button>
        </form>
    </div>

</body>
</html>
