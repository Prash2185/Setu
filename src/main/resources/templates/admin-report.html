<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Usage Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .card { border-radius: 10px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table th { background-color: #343a40; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🛡️ CloudBilling Admin Center</a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Back to My Dashboard</a>
    </div>
</nav>

<div class="container">
    <div class="card p-4">
        <h4 class="mb-4"><i class="bi bi-bar-chart-fill text-primary"></i> Master Usage & Billing Report</h4>
        
        <table class="table table-hover table-bordered text-center align-middle">
            <thead>
                <tr>
                    <th>Customer / User ID</th>
                    <th>Total Storage Used (MB)</th>
                    <th>Bandwidth Egress (MB)</th>
                    <th>Total API Operations</th>
                    <th>Live Payable Bill (INR)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${reports}">
                    <td class="fw-bold text-secondary" th:text="${user.username}">user1</td>
                    <td th:text="${user.ingressMB}">0.00</td>
                    <td th:text="${user.egressMB}">0.00</td>
                    <td><span class="badge bg-info text-dark" th:text="${user.apiCalls} + ' Calls'">0 Calls</span></td>
                    
                    <td class="fw-bold" th:style="${user.totalBill == '0.0000' ? 'color: green;' : 'color: red;'}" th:text="'₹ ' + ${user.totalBill}">₹ 0.0000</td>
                    
                    <td><button class="btn btn-sm btn-outline-danger">Suspend</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
