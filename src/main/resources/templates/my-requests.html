<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests | Setu Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-brand { color: #deff9a !important; font-weight: bold; letter-spacing: 1px; }
        .dashboard-container { margin-top: 40px; }
        .custom-table {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .table { margin-bottom: 0; color: #cbd5e1; }
        .table thead th {
            background-color: #0f172a;
            color: #94a3b8;
            border-bottom: 2px solid #334155;
            padding: 15px;
        }
        .table tbody td {
            border-bottom: 1px solid #334155;
            padding: 15px;
            vertical-align: middle;
        }
        .table tbody tr:hover { background-color: rgba(255, 255, 255, 0.02); }
        
        /* Status Badges */
        .badge-pending { background-color: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid #f59e0b; }
        .badge-approved { background-color: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid #10b981; }
        
        /* Action Buttons */
        .btn-approve { background-color: transparent; border: 1px solid #10b981; color: #10b981; }
        .btn-approve:hover { background-color: #10b981; color: #fff; }
        .btn-reject { background-color: transparent; border: 1px solid #ef4444; color: #ef4444; }
        .btn-reject:hover { background-color: #ef4444; color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-cloud me-2"></i>SETU CLOUDBILLING</a>
            <span class="text-light"><i class="fa-regular fa-user me-2"></i>Welcome, Admin</span>
        </div>
    </nav>

    <div class="container dashboard-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fa-solid fa-inbox text-primary me-2"></i> File Access Requests</h2>
        </div>

        <div class="custom-table">
            <table class="table table-borderless">
                <thead>
                    <tr>
                        <th>Request ID</th>
                        <th>File Name</th>
                        <th>Requested By</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-secondary">#REQ-8021</td>
                        <td><strong>System_Architecture.pdf</strong></td>
                        <td>user.name@example.com</td>
                        <td><span class="badge badge-pending rounded-pill px-3 py-2">PENDING</span></td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-approve me-2"><i class="fa-solid fa-check"></i> Approve</button>
                            <button class="btn btn-sm btn-reject"><i class="fa-solid fa-xmark"></i> Reject</button>
                        </td>
                    </tr>
                    
                    <tr>
                        <td class="text-secondary">#REQ-8020</td>
                        <td><strong>Billing_Invoice_May.csv</strong></td>
                        <td>client_acc@domain.com</td>
                        <td><span class="badge badge-approved rounded-pill px-3 py-2">APPROVED</span></td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-secondary disabled"><i class="fa-solid fa-check-double"></i> Done</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
