<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Requests - Zoho Setu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style> 
        body { background-color: #f4f6f9; } 
        .custom-card { border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard">☁️ Zoho Setu</a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">🔙 Back to Dashboard</a>
    </div>
</nav>

<div class="container">
    <div class="card custom-card p-4 mx-auto" style="max-width: 800px;">
        <h4 class="mb-4 text-dark"><i class="bi bi-envelope-paper-fill text-primary me-2"></i> Pending Access Requests</h4>
        
        <div th:if="${#lists.isEmpty(requests)}" class="alert alert-success text-center fw-bold rounded-3">
            🎉 All caught up! No pending requests right now.
        </div>

        <table class="table table-hover align-middle border" th:unless="${#lists.isEmpty(requests)}">
            <thead class="table-light">
                <tr>
                    <th>Requester User ID</th>
                    <th>Status</th>
                    <th class="text-end">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="req : ${requests}">
                    <td class="fw-bold text-secondary" th:text="${req.requesterUsername}">user123</td>
                    <td>
                        <span class="badge bg-warning text-dark border border-warning px-3 py-2 rounded-pill">
                            <i class="bi bi-hourglass-split"></i> Pending
                        </span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{'/approve-request/' + ${req.id}}" class="btn btn-sm btn-success fw-bold me-2">
                            <i class="bi bi-check-circle-fill"></i> Approve
                        </a>
                        <a th:href="@{'/reject-request/' + ${req.id}}" class="btn btn-sm btn-danger fw-bold">
                            <i class="bi bi-x-circle-fill"></i> Reject
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
