# 1. Server Configuration
server.port=8081
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# 2. Database Connection (THE NINJA TRICK: FILE MODE)
# Yeh tere project folder ke andar hi 'cloudbillingdb.mv.db' naam ki ek file bana dega
spring.datasource.url=jdbc:h2:file:./cloudbillingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 3. Hibernate Settings
# 'update' ka matlab hai ki purana data delete mat karna, usme naya add karte rehna
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true